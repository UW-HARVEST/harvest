# The default configurations options for harvest_translate.

force = false
log_filter = "info"
modular = false
agentic = false
agentic_verify = false
max_repair_passes = 1

[tools.raw_source_to_cargo_llm]
address = "http://localhost:11434"
backend = "ollama"
model = "codellama:7b"
max_tokens = 10000

[tools.modular_translation_llm]
address = "http://localhost:11434"
backend = "ollama"
model = "codellama:7b"
max_tokens = 10000

[tools.translate_agentic]
timeout_secs = 1800

[tools.verify_fix_agentic]
timeout_secs = 2700
